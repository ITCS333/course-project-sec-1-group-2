<!--
  Requirement: Create the Admin View for the Weekly Breakdown

  Instructions:
  Fill in the HTML elements as described in the comments.
  This page allows the teacher (admin) to perform full CRUD operations
  on the weekly course content.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Manage Weekly Breakdown</title>

    <!-- Link to stylesheet (you can change the file name if needed) -->
    <link rel="stylesheet" href="styles.css">

    <!-- Required JS -->
    <script src="admin.js" defer></script>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Manage Weekly Breakdown</h1>
    </header>

    <!-- Main content -->
    <main>

        <!-- ============================================================
             Section 1: Add / Edit Week Form
             ============================================================ -->
        <section>
            <h2>Add a New Week</h2>

            <form id="week-form" action="#">
                <fieldset>
                    <legend>Weekly Details</legend>

                    <!-- Week Title -->
                    <label for="week-title">Week Title:</label>
                    <input 
                        type="text" 
                        id="week-title" 
                        placeholder="Week 1: Introduction to HTML" 
                        required
                    >

                    <!-- Start Date -->
                    <label for="week-start-date">Start Date:</label>
                    <input 
                        type="date" 
                        id="week-start-date" 
                        required
                    >

                    <!-- Description -->
                    <label for="week-description">Description:</label>
                    <textarea 
                        id="week-description" 
                        rows="5"
                    ></textarea>

                    <!-- Resource Links -->
                    <label for="week-links">Resource Links (one per line):</label>
                    <textarea 
                        id="week-links" 
                        rows="3"
                    ></textarea>

                    <!-- Submit Button -->
                    <button id="add-week" type="submit">
                        Add Week
                    </button>

                </fieldset>
            </form>
        </section>

        <!-- ============================================================
             Section 2: Existing Weekly Entries
             ============================================================ -->
        <section>
            <h2>Current Weekly Breakdown</h2>

            <table id="weeks-table">
                <thead>
                    <tr>
                        <th>Week Title</th>
                        <th>Start Date</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="weeks-tbody">
                    <!-- admin.js will inject rows here -->
                </tbody>
            </table>
        </section>

    </main>

</body>
</html>
